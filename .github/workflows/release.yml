name: release

on:
  push:
    tags:
      - 'v*'

# The pinned actions below (checkout@v4, setup-java@v4, setup-gradle@v4,
# action-gh-release@v2) still bundle the Node 20 runtime, which GitHub
# force-retires on 2026-06-16. Opt every JS action onto Node 24 now so
# releases keep building past the cutoff instead of breaking silently.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk dt-streamz.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dt-streamz.apk
          fail_on_unmatched_files: true
          prerelease: false
