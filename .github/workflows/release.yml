name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        env:
          # TMDb key for the Must Watch row, injected from repo secrets so it
          # isn't committed. build.gradle.kts reads TMDB_API_KEY from the env
          # when local.properties is absent (as it is on CI).
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk dt-streamz.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dt-streamz.apk
          fail_on_unmatched_files: true
          prerelease: false
